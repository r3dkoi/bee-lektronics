<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bee-lektronics{% endblock %}</title>
    <!-- Shared style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
</head>
<body>
    <header class="navbar">
        <a href="{{ url_for('main.shop') }}" class="nav-link">Shop</a>

        <a href="{{ url_for('main.home') }}" class="brand-logo">
            <img src="{{ url_for('static', filename='images/bee_logo.png') }}" alt="Bee-lektronics Logo">
        </a>

        <button type="button" id="cart-toggle" class="nav-link">Cart</button>
    </header>
    
    <!-- Shopping Minicart Overlay -->
    <div class="minicart-overlay" id="minicart-overlay" hidden>
        <div class="minicart-panel">
            <div class="minicart-header">
                <h2>Shopping Cart</h2>
                <button type="button" id="minicart-close" aria-label="Close">&times;</button>
            </div>

            <div class="minicart-items" id="minicart-items">
                <!-- POPULATE BY JS VIA FETCH -- EMPTY STATE SHOWN UNTIL CART DATA LOADS -->
                <p class="minicart-empty">Your Shopping Cart Is Empty</p>
            </div>

            <!-- DOM TEMPLATE FOR WHEN ITEM(S) GET ADDED, cloned by JS, never rendered directly -->
            <template id="minicart-item-template">
                <div class="minicart-item" data-product-id="">
                    <img src="" alt="" class="minicart-item-image">
                    <div class="minicart-item-info">
                        <p class="item-name"></p>
                        <p class="item-price"></p>
                        <div class="quantity-selector">
                            <button type="button" class="quantity-decrease">-</button>
                            <span class="quantity-value"></span>
                            <button type="button" class="quantity-increase">+</button>
                        </div>
                    </div>
                </div>
            </template>

            <div class="minicart-footer" id="minicart-footer" hidden>
                <div class="minicart-subtotal">
                    <span>Subtotal</span>
                    <span id="minicart-subtotal-amount">$0.00</span> <!-- Will be overwritten in JavaScript/Fetch -->
                </div>
                <a href="#" class="button-checkout">Checkout</a> <!-- TODO: swap to url_for('orders.checkout') once routes/orders.py exists -->
            </div>
        </div>
    </div>


    <!-- Every page's unique content is put here -->
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <footer class="site-footer">
        <div class="footer-brand-logo">
            <img src="{{ url_for('static', filename='images/bee_logo.png') }}" alt="Bee-lektronics Logo">
        </div>

        <nav class="footer-links">
            <a href="{{ url_for('main.shop') }}">Shop</a>
        </nav>

        <div class="footer-bottom">
            &copy; 2026 Koi & aardlucra. All rights reserved.
        </div>
    </footer>

    <!-- Shared JS -->
    <script src="{{ url_for('static', filename='js/main.js')}}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
