{% extends "base.html" %}

{% block title %}Home | Bee-lektronics{% endblock %}

{% block content %}
    <section class="hero">
        <img src="static/images/honeycomb.jpg" alt="Picture of honeycomb">
        <div class="hero-text">
            <h1>Smart Devices, Honeypot deals</h1>
            <p>Your one-stop hive for phones, computers & everything digital</p>
            <a href="{{ url_for('main.shop') }}" class="button-explore">Explore</a>
        </div>
    </section>

    <section class="featured">
        <div class="featured-text">
        <h2>What's buzzing right now</h2>
        <p>The tech everyone wants this season</p>
        </div>
        
        <div class="carousel-wrapper">
            <button type="button" class="carousel-nav carousel-prev" aria-label="Previous products">&lsaquo;</button>

            <div class="carousel-featured">
                <!--TODO: LOOP THROUGH FEATURED PRODUCTS ONCE REAL DATA EXISTS, for now placeholder items below -->
                <div class="carousel-item">
                    <img src="https://placehold.co/300x300.png?text=Product+1" alt="Product 1 placeholder">
                </div>
                <div class="carousel-item">
                    <img src="https://placehold.co/300x300.png?text=Product+2" alt="Product 2 placeholder">
                </div>
                <div class="carousel-item">
                    <img src="https://placehold.co/300x300.png?text=Product+3" alt="Product 3 placeholder">
                </div>
                <div class="carousel-item">
                    <img src="https://placehold.co/300x300.png?text=Product+4" alt="Product 4 placeholder">
                </div>
                <div class="carousel-item">
                    <img src="https://placehold.co/300x300.png?text=Product+5" alt="Product 5 placeholder">
                </div>
                <div class="carousel-item">
                    <img src="https://placehold.co/300x300.png?text=Product+6" alt="Product 6 placeholder">
                </div>
            </div>

            <button type="button" class="carousel-nav carousel-next" aria-label="Next products">&rsaquo;</button>

            <!-- POPULATED BY JS: one dot per .carousel-item -->
            <div class="carousel-dots"></div>
        </div>
    </section>
{% endblock %}
