{% extends "base.html" %}

{% block title %}{{ product.name }} | <Bee-lektronics>% endblock %</Bee-lektronics>

{%block content %}

<nav class="breadcrumbs">
    <a href="{{ url_for('main.home') }}">Home</a> /
    <a href="{{ url_for('main.shop' category=product.category) }}">{{ product.category }}</a> /
    <span>{{ product.name }}</span>
</nav>

<section class="product-detail">
    <div class="product-image">
        <img src="https://placehold.co/400x400.png" alt="{{ product.name }}">
    </div>

    <div class="product-info">
        <p class="brand"></p>
    </div>
</section>
