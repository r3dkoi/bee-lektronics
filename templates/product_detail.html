{% extends "base.html" %}

{% block title %}{{ product.name }} | <Bee-lektronics>% endblock %</Bee-lektronics> {% endblock %}

{% block content %}

<nav class="breadcrumbs">
    <a href="{{ url_for('main.home') }}">Home</a> /
    <a href="{{ url_for('main.shop', category=product.category) }}">{{ product.category }}</a> /
    <span>{{ product.name }}</span>
</nav>

<section class="product-detail">
    <div class="product-image">
        <img src="{{ product.image }}" alt="{{ product.name }}">
    </div>

    <div class="product-info">
        <h1>{{ product.name }}</h1>
        <p class="description">{{ product.description }}</p>
        <p class="price">${{ "%2.f"|format(product.price) }}</p>

        <form method="POST" action="{{ url_for('cart.add_to_cart', product_id=product.id) }}" class="add-to-cart-form">
            <div class="quantity-selector">
                <button type="button">-</button>
                <input type="number" name="quantity" value="0" min="0">
                <button type="button">+</button>
            </div>
            <button type="submit">Add to Cart</button>
        </form>
    </div>
</section>

{% endblock %}
